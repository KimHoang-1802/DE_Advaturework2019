version: 2

sources:
  - name: adventureworks
    database: AdventureWorks2019
    schema: Sales
    tables:
      - name: SalesOrderHeader
        description: "Bảng chứa thông tin đơn hàng bán"
        columns:
          - name: SalesOrderID
            description: "ID đơn hàng"
            tests:
              - unique
              - not_null
          - name: OrderDate
            description: "Ngày đặt hàng"
          - name: CustomerID
            description: "ID khách hàng"
          - name: SalesPersonID
            description: "ID nhân viên bán"
          - name: TerritoryID
            description: "ID vùng bán"
          - name: Status
            description: "Trạng thái đơn hàng"
          - name: TotalDue
            description: "Tổng tiền đơn hàng"
      
      - name: SalesOrderDetail
        description: "Bảng chi tiết dòng đơn hàng"
        columns:
          - name: SalesOrderID
            description: "ID đơn hàng"
          - name: ProductID
            description: "ID sản phẩm"
          - name: OrderQty
            description: "Số lượng đặt"
          - name: UnitPrice
            description: "Giá đơn vị"
          - name: LineTotal
            description: "Tổng giá dòng"
      
      - name: SalesTerritory
        description: "Bảng thông tin vùng bán"
        columns:
          - name: TerritoryID
            description: "ID vùng"
          - name: Name
            description: "Tên vùng"
          - name: Group
            description: "Nhóm vùng"
          - name: CountryRegionCode
            description: "Mã quốc gia"
      
      - name: Customer
        description: "Bảng thông tin khách hàng"
        columns:
          - name: CustomerID
            description: "ID khách hàng"
          - name: StoreID
            description: "ID cửa hàng"

  - name: adventureworks_person
    database: AdventureWorks2019
    schema: Person
    tables:
      - name: Person
        description: "Bảng thông tin người"
        columns:
          - name: BusinessEntityID
            description: "ID doanh nghiệp"
          - name: PersonType
            description: "Loại người (EM=Employee, SP=Sales Person)"
          - name: FirstName
            description: "Tên"
          - name: LastName
            description: "Họ"

      - name: Employee
        description: "Bảng thông tin nhân viên"
        columns:
          - name: BusinessEntityID
            description: "ID nhân viên"
          - name: JobTitle
            description: "Chức danh"
          - name: HireDate
            description: "Ngày tuyển dụng"
          - name: CurrentFlag
            description: "Nhân viên hiện tại (1=Yes, 0=No)"

  - name: adventureworks_production
    database: AdventureWorks2019
    schema: Production
    tables:
      - name: Product
        description: "Bảng thông tin sản phẩm"
        columns:
          - name: ProductID
            description: "ID sản phẩm"
          - name: Name
            description: "Tên sản phẩm"
          - name: ProductNumber
            description: "Mã sản phẩm"
          - name: Color
            description: "Màu sắc"
          - name: Size
            description: "Kích cỡ"
          - name: Style
            description: "Kiểu dáng"
          - name: ProductSubcategoryID
            description: "ID danh mục con"
          - name: MakeFlag
            description: "Sản xuất (1=Make, 0=Buy)"

      - name: ProductCategory
        description: "Bảng danh mục sản phẩm"
        columns:
          - name: ProductCategoryID
            description: "ID danh mục"
          - name: Name
            description: "Tên danh mục"

      - name: ProductSubcategory
        description: "Bảng danh mục con sản phẩm"
        columns:
          - name: ProductSubcategoryID
            description: "ID danh mục con"
          - name: ProductCategoryID
            description: "ID danh mục cha"
          - name: Name
            description: "Tên danh mục con"

models:
  - name: stg_dim_territory
    description: "Staging cho bảng Territory dimension"
    columns:
      - name: territory_id
        description: "ID vùng bán"
        tests:
          - unique
          - not_null

  - name: stg_dim_employee
    description: "Staging cho bảng Employee dimension"

  - name: stg_dim_customer
    description: "Staging cho bảng Customer dimension"

  - name: stg_dim_product
    description: "Staging cho bảng Product dimension"

  - name: stg_fact_sales
    description: "Staging cho bảng Sales fact"